schema_version: "1.0.0"
mission: "software-dev"
profile: "comprehensive"
answers:
  project_intent: >
    agent-mail is generic, releasable, open-source infrastructure (GPL-3.0-or-later,
    published to PyPI and as a Docker image on GHCR): a NATS JetStream-backed mailbox
    that lets local LLM coding agents (Claude, Codex, Gemini, ...) message and notify
    each other. It ships a CLI primitive (send/inbox/read/reply/notify) and a hostable
    MCP server sharing one core. The hosted HTTP server is multi-tenant: each agent
    connects on its own URL (/<agent>/mcp) which is its whole identity and
    configuration. It must remain generic — no deployment-specific hostnames, IPs,
    secrets, or organisation names in code, docs, or tests; agent names are config.
  languages_frameworks: >
    Python 3.12+ only, managed exclusively with uv (uv sync / uv run / uv add).
    Libraries: click (CLI), pydantic + pydantic-settings (models/config), nats-py
    (JetStream), mcp / FastMCP (MCP server), tenacity (retries), uvicorn (HTTP).
    Build backend hatchling + hatch-vcs (version from git tags).
  testing_requirements: >
    pytest only (never unittest), plain test functions, fixtures for shared setup.
    Tests live in /tests mirroring the source layout. Unit tests fake NATS where
    practical; a live round-trip integration test runs against real JetStream and is
    gated behind AGENT_MAIL_INTEGRATION=1. Prefer integration coverage for v1 work.
    No fixed coverage floor is mandated for this POC-stage project.
  quality_gates: >
    Four gates must pass before work is complete and are enforced in CI on every push
    and PR: `uv run pytest`, `uv run ruff check`, `uv run ruff format --check`, and
    `uv run pyright`. Prefer auto-fix (ruff --fix) over disabling a rule. Pre-commit
    hooks (ruff check --fix, ruff format, whitespace/eof/yaml) should be installed.
  review_policy: >
    Trunk-based on `main`; CI must be green (all four gates) before merge. Conventional
    commit prefixes (feat/fix/docs/test/chore). Commit and push eagerly in small,
    focused steps. Changes to public behaviour must update docs in the same change.
  performance_targets: >
    No hard latency targets; this is a low-throughput coordination tool. Transient IO
    (NATS connect) must retry with tenacity rather than fail on a cold server.
  deployment_constraints: >
    Releasable via PyPI (Trusted Publishing / OIDC on v* tags) and as a multi-arch
    Docker image pushed to GHCR (:latest on main, :version on tags). NATS with
    JetStream is a runtime prerequisite (not bundled); point NATS_URL at it. The
    hosted MCP server exposes GET /health. No secrets in the repo; a .env.example
    documents required keys.
  documentation_policy: >
    README is the front door; docs/ holds the hosting guide, MCP-client setup, the
    agent-onboarding page, the "check your inbox" snippet, and architecture decisions
    under docs/decisions (ADRs). docs/coding-standards.md is the canonical coding
    baseline and AGENTS.md is the project charter summary. Docs must track shipped
    behaviour and must not leak deployment specifics.
  risk_boundaries: >
    Most costly failures: silently dropping or double-processing a message, and
    leaking deployment-specific or secret material into the public repo. Durability
    and idempotency are JetStream's job (durable per-agent consumers, explicit
    ack/nak) — a redelivered message must never be double-processed. The CLI and MCP
    server must both delegate to the single core (agent_mail.mailbox.Mailbox); no
    logic duplication. Follow the EUNRG coding standards (docs/coding-standards.md):
    full type annotations, absolute imports, specific exceptions from a project-level
    exceptions module (AgentMailError base), logging over print (click.echo allowed
    for CLI output but also log), config through one pydantic-settings object, frozen
    immutable data where practical, mature pinned dependencies.
  amendment_process: >
    Governance changes go through /spec-kitty.charter (edit answers.yaml, regenerate,
    commit). AGENTS.md mirrors the binding rules for day-to-day agent reference.
  exception_policy: >
    Deviations from the coding-standards baseline must be documented with their reason
    in AGENTS.md under project-specific overrides. `except Exception:` is permitted
    only at process boundaries (CLI main, HTTP handler) as a logging backstop.
