name: Docker image

# Build the hostable MCP server image (multi-arch: linux/amd64 + linux/arm64, so it
# runs on Intel/AMD servers, Apple Silicon, and 64-bit Raspberry Pi) and push it.
# On every push to main -> :latest (+ :main-<sha>). On a v* tag -> :<version>.
#
# It always publishes to GHCR (ghcr.io/<owner>/agent-inbox, no setup needed) and ALSO
# to Docker Hub as soon as these repo secrets exist (Settings -> Secrets and variables
# -> Actions); until then the Docker Hub push is skipped, not failed:
#   DOCKERHUB_USERNAME  your Docker Hub account/namespace
#   DOCKERHUB_TOKEN     a Docker Hub access token (hub.docker.com -> Account
#                       Settings -> Security -> New Access Token, Read/Write)

on:
  push:
    branches: ["main"]
    tags: ["v*"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # for GHCR
    env:
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for git-describe version

      - name: Compute a valid PEP 440 version
        id: version
        # On a v* tag use it (0.1.0); otherwise 0.0.0 — an untagged `git describe`
        # returns a bare SHA, which is not a valid version and breaks hatch-vcs.
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve target registries
        id: reg
        # GHCR always; Docker Hub only when its secrets are configured.
        run: |
          imgs="ghcr.io/${{ github.repository_owner }}/agent-inbox"
          if [ "${HAS_DOCKERHUB}" = "true" ]; then
            imgs=$(printf 'docker.io/%s/agent-inbox\n%s' "${{ secrets.DOCKERHUB_USERNAME }}" "$imgs")
          fi
          { echo 'images<<EOF'; printf '%s\n' "$imgs"; echo 'EOF'; } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.reg.outputs.images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
