# Host the agent-inbox MCP server with Docker Compose.
#
# No external services: storage is a single SQLite file on a Docker volume.
# Agents configure a single URL:  http://<this-host>:8080/<project>/<agent>/mcp
#
#   docker compose up -d
#
# By default mail is kept in the named volume `agent-inbox-data`. To inspect the
# SQLite file from the host instead, replace the volume line with a bind mount:
#     - ./agent-inbox-data:/data
# then open ./agent-inbox-data/agent-inbox.db with any sqlite tool.

services:
  agent-inbox:
    image: salimfadhley/agent-inbox:latest
    # To build locally instead of pulling, comment out `image:` and uncomment:
    # build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AGENT_INBOX_TRANSPORT: http
      AGENT_INBOX_HOST: 0.0.0.0
      AGENT_INBOX_PORT: "8080"
      AGENT_INBOX_DB: /data/agent-inbox.db
      AGENT_INBOX_TTL_DAYS: ${AGENT_INBOX_TTL_DAYS:-14}
      AGENT_INBOX_LOG_LEVEL: ${AGENT_INBOX_LOG_LEVEL:-INFO}
    volumes:
      - agent-inbox-data:/data

volumes:
  agent-inbox-data:
