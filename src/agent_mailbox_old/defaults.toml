# agent-inbox baked defaults.
#
# This file ships inside the package and documents every setting with its default.
# Resolution order (later wins):
#   these defaults  <  your --config file  <  environment variables
#
# Every key below is also an environment variable: the UPPERCASE form of the key
# (e.g. `db` here == `AGENT_INBOX_DB` in the environment). Copy this file, edit it,
# and pass it with `--config path.toml` or AGENT_INBOX_CONFIG=path.toml.

# --- Storage (a single local SQLite file — no external services) ----------
# Default: $XDG_DATA_HOME/agent-inbox/agent-inbox.db (usually
# ~/.local/share/agent-inbox/agent-inbox.db). In a container, point this at a
# mounted volume, e.g. /data/agent-inbox.db.
# db = "/data/agent-inbox.db"           # env AGENT_INBOX_DB

# Messages older than this are purged automatically (0 disables expiry).
ttl_days = 14                          # env AGENT_INBOX_TTL_DAYS

# Reject any single message larger than this many bytes (advertised via hub_info).
max_message_bytes = 1048576            # env AGENT_INBOX_MAX_MESSAGE_BYTES  (1 MiB)

# An agent shows as "online" in the directory if it was active within this window.
online_seconds = 300                   # env AGENT_INBOX_ONLINE_SECONDS

# --- Identity (two-part: project + agent) ---------------------------------
# Addresses are <project>/<agent>. For the CLI and single-agent (stdio) servers,
# set both. Leave unset for a hosted multi-agent http server (identity comes from
# each agent's URL /<project>/<agent>/mcp instead).
# project = "agent-inbox"               # env AGENT_INBOX_PROJECT
# agent_id = "claude-opus"             # env AGENT_ID  (the agent name)

# --- MCP server (agent-inbox mcp-serve) ------------------------------------
transport = "stdio"                    # env AGENT_INBOX_TRANSPORT  (stdio | http)
host = "127.0.0.1"                     # env AGENT_INBOX_HOST
port = 8080                            # env AGENT_INBOX_PORT
path = "/mcp"                          # env AGENT_INBOX_PATH
# public_url = "https://mail.example"  # env AGENT_INBOX_PUBLIC_URL
                                       # advertised base URL when behind a proxy

# --- Human web console (agent-inbox mcp-serve, http transport) ------------
# The operator console is served at /ui on the http server (a browser hitting /
# is redirected there). It shows any mailbox read-only and lets the operator
# compose + read their own inbox. Needs the [ui] extra: pip install agent-inbox[ui]
ui = true                              # env AGENT_INBOX_UI  (serve /ui on http)
# The identity console-sent mail is from, and the one inbox that is interactive.
operator = "agent-inbox/human"         # env AGENT_INBOX_OPERATOR

# --- Hub identity & administration (advertised to agents via hub_info) ----
# hub_name = the name of this mailbox collection; set a distinct one per collection.
hub_name = "agent-inbox"                # env AGENT_INBOX_HUB_NAME
# hub_description = "Homelab agent mail"        # env AGENT_INBOX_HUB_DESCRIPTION
# admin_agent = "admin"                # env AGENT_INBOX_ADMIN_AGENT
                                       # agents can mail this id for help
# host_agent = "host"                  # env AGENT_INBOX_HOST_AGENT
                                       # coordinator agents introduce themselves to
# issue_url = "https://github.com/you/repo/issues"   # env AGENT_INBOX_ISSUE_URL
# contact = "ops@example.com"          # env AGENT_INBOX_CONTACT

# --- Operations -----------------------------------------------------------
log_level = "WARNING"                  # env AGENT_INBOX_LOG_LEVEL (DEBUG..ERROR)
